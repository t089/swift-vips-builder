name: Build and Push Docker Images

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Rebuild images even if the tag already exists in the registry'
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: t089/swift-vips-builder

jobs:
  compute-matrix:
    name: Compute build matrix
    runs-on: ubuntu-latest
    outputs:
      amd64_matrix: ${{ steps.compute.outputs.amd64_matrix }}
      arm64_matrix: ${{ steps.compute.outputs.arm64_matrix }}
      manifest_matrix: ${{ steps.compute.outputs.manifest_matrix }}
      needs_amd64: ${{ steps.compute.outputs.needs_amd64 }}
      needs_arm64: ${{ steps.compute.outputs.needs_arm64 }}
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute matrix
        id: compute
        env:
          FORCE_REBUILD: ${{ github.event.inputs.force_rebuild || 'false' }}
        run: |
          set -euo pipefail

          # when updating swift or vips versions, edit here only
          SWIFT_VERSIONS=("6.2.4" "6.3.0")
          AMD64_VIPS=("8.16.1" "8.17.3" "8.18.1" "8.18.2")
          ARM64_VIPS=("8.16.1" "8.17.3" "8.18.2")

          tag_exists() {
            docker manifest inspect "${REGISTRY}/${IMAGE_NAME}:$1" >/dev/null 2>&1
          }

          should_build() {
            if [ "$FORCE_REBUILD" = "true" ]; then
              return 0
            fi
            if tag_exists "$1"; then
              echo "  skip (exists): $1" >&2
              return 1
            fi
            echo "  build: $1" >&2
            return 0
          }

          amd64=()
          echo "AMD64 tags:" >&2
          for s in "${SWIFT_VERSIONS[@]}"; do
            for v in "${AMD64_VIPS[@]}"; do
              if should_build "swift-${s}-vips-${v}-amd64"; then
                amd64+=("{\"swift-version\":\"${s}\",\"vips-version\":\"${v}\"}")
              fi
            done
          done

          arm64=()
          echo "ARM64 tags:" >&2
          for s in "${SWIFT_VERSIONS[@]}"; do
            for v in "${ARM64_VIPS[@]}"; do
              if should_build "swift-${s}-vips-${v}-arm64"; then
                arm64+=("{\"swift-version\":\"${s}\",\"vips-version\":\"${v}\"}")
              fi
            done
          done

          manifest=()
          echo "Manifest tags:" >&2
          for s in "${SWIFT_VERSIONS[@]}"; do
            for v in "${ARM64_VIPS[@]}"; do
              # manifest needs both arches available
              if ! printf '%s\n' "${AMD64_VIPS[@]}" | grep -qx "$v"; then
                continue
              fi
              if should_build "swift-${s}-vips-${v}"; then
                manifest+=("{\"swift-version\":\"${s}\",\"vips-version\":\"${v}\"}")
              fi
            done
          done

          join() { local IFS=,; echo "[$*]"; }

          {
            echo "amd64_matrix=$(join "${amd64[@]}")"
            echo "arm64_matrix=$(join "${arm64[@]}")"
            echo "manifest_matrix=$(join "${manifest[@]}")"
            echo "needs_amd64=$([ ${#amd64[@]} -gt 0 ] && echo true || echo false)"
            echo "needs_arm64=$([ ${#arm64[@]} -gt 0 ] && echo true || echo false)"
          } >> "$GITHUB_OUTPUT"

  create-amd64-runner:
    name: Create Hetzner Cloud AMD64 runner
    needs: compute-matrix
    if: needs.compute-matrix.outputs.needs_amd64 == 'true'
    runs-on: ubuntu-latest
    outputs:
      label: ${{ steps.create-hcloud-runner.outputs.label }}
      server_id: ${{ steps.create-hcloud-runner.outputs.server_id }}
    steps:
      - name: Create AMD64 runner
        id: create-hcloud-runner
        uses: Cyclenerd/hcloud-github-runner@v1
        with:
          mode: create
          github_token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
          server_type: cpx42  # 8 vCPU, 16GB RAM, x86
          location: nbg1
          image: ubuntu-24.04
          ssh_key: 101152278
          pre_runner_script: |
            # Install Docker
            apt-get update
            apt-get install -y ca-certificates curl
            install -m 0755 -d /etc/apt/keyrings
            curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
            chmod a+r /etc/apt/keyrings/docker.asc
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo "$VERSION_CODENAME") stable" | tee /etc/apt/sources.list.d/docker.list > /dev/null
            apt-get update
            apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
            usermod -aG docker runner || true


  create-arm64-runner:
    name: Create Hetzner Cloud ARM64 runner
    needs: compute-matrix
    if: needs.compute-matrix.outputs.needs_arm64 == 'true'
    runs-on: ubuntu-latest
    outputs:
      label: ${{ steps.create-hcloud-runner.outputs.label }}
      server_id: ${{ steps.create-hcloud-runner.outputs.server_id }}
    steps:
      - name: Create ARM64 runner
        id: create-hcloud-runner
        uses: Cyclenerd/hcloud-github-runner@v1
        with:
          mode: create
          github_token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
          server_type: cax31  # 8 vCPU, 16GB RAM, ARM
          location: nbg1
          image: ubuntu-24.04
          ssh_key: 101152278
          pre_runner_script: |
            # Install Docker
            apt-get update
            apt-get install -y ca-certificates curl
            install -m 0755 -d /etc/apt/keyrings
            curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
            chmod a+r /etc/apt/keyrings/docker.asc
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo "$VERSION_CODENAME") stable" | tee /etc/apt/sources.list.d/docker.list > /dev/null
            apt-get update
            apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
            usermod -aG docker runner || true

  build-amd64:
    name: Build AMD64 images
    needs: [compute-matrix, create-amd64-runner]
    strategy:
      max-parallel: 4
      matrix:
        include: ${{ fromJSON(needs.compute-matrix.outputs.amd64_matrix) }}
    runs-on: ${{ needs.create-amd64-runner.outputs.label }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:swift-${{ matrix.swift-version }}-vips-${{ matrix.vips-version }}-amd64"
          docker buildx build \
            --build-arg SWIFT_VERSION=${{ matrix.swift-version }} \
            --build-arg VIPS_VERSION=${{ matrix.vips-version }} \
            --tag "$TAG" \
            --output type=docker \
            .

          if [ "${{ github.event_name }}" != "pull_request" ]; then
            docker push "$TAG"
          fi

  build-arm64:
    name: Build ARM64 images
    needs: [compute-matrix, create-arm64-runner]
    strategy:
      max-parallel: 4
      matrix:
        include: ${{ fromJSON(needs.compute-matrix.outputs.arm64_matrix) }}
    runs-on: ${{ needs.create-arm64-runner.outputs.label }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:swift-${{ matrix.swift-version }}-vips-${{ matrix.vips-version }}-arm64"
          docker buildx build \
            --build-arg SWIFT_VERSION=${{ matrix.swift-version }} \
            --build-arg VIPS_VERSION=${{ matrix.vips-version }} \
            --tag "$TAG" \
            --output type=docker \
            .

          if [ "${{ github.event_name }}" != "pull_request" ]; then
            docker push "$TAG"
          fi

  create-manifests:
    name: Create multi-arch manifests
    needs: [compute-matrix, build-amd64, build-arm64]
    if: |
      github.event_name != 'pull_request' &&
      always() &&
      needs.build-amd64.result != 'failure' &&
      needs.build-amd64.result != 'cancelled' &&
      needs.build-arm64.result != 'failure' &&
      needs.build-arm64.result != 'cancelled' &&
      fromJSON(needs.compute-matrix.outputs.manifest_matrix)[0] != null
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include: ${{ fromJSON(needs.compute-matrix.outputs.manifest_matrix) }}

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest
        run: |
          MANIFEST_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:swift-${{ matrix.swift-version }}-vips-${{ matrix.vips-version }}"
          AMD64_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:swift-${{ matrix.swift-version }}-vips-${{ matrix.vips-version }}-amd64"
          ARM64_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:swift-${{ matrix.swift-version }}-vips-${{ matrix.vips-version }}-arm64"

          docker manifest create "$MANIFEST_TAG" \
            "$AMD64_TAG" \
            "$ARM64_TAG"

          docker manifest push "$MANIFEST_TAG"

  delete-amd64-runner:
    name: Delete Hetzner Cloud AMD64 runner
    needs: [create-amd64-runner, build-amd64, create-manifests]
    runs-on: ubuntu-latest
    if: ${{ always() && needs.create-amd64-runner.result == 'success' }}
    steps:
      - name: Delete AMD64 runner
        uses: Cyclenerd/hcloud-github-runner@v1
        with:
          mode: delete
          github_token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
          name: ${{ needs.create-amd64-runner.outputs.label }}
          server_id: ${{ needs.create-amd64-runner.outputs.server_id }}

  delete-arm64-runner:
    name: Delete Hetzner Cloud ARM64 runner
    needs: [create-arm64-runner, build-arm64, create-manifests]
    runs-on: ubuntu-latest
    if: ${{ always() && needs.create-arm64-runner.result == 'success' }}
    steps:
      - name: Delete ARM64 runner
        uses: Cyclenerd/hcloud-github-runner@v1
        with:
          mode: delete
          github_token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
          name: ${{ needs.create-arm64-runner.outputs.label }}
          server_id: ${{ needs.create-arm64-runner.outputs.server_id }}
